# TalentOS — full stack (optional local compose)

services:
  mongodb:
    image: mongo:7
    container_name: talentos-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: talentos
      MONGO_INITDB_ROOT_PASSWORD: talentos
      MONGO_INITDB_DATABASE: talentos
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: talentos-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      MONGODB_URI: mongodb://talentos:talentos@mongodb:27017/talentos?authSource=admin
      CORS_ORIGINS: http://localhost:3000
    depends_on:
      mongodb:
        condition: service_healthy

  ai-service:
    build:
      context: ../../apps/ai-service
      dockerfile: Dockerfile
    container_name: talentos-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
      DEBUG: "true"
      MONGODB_URI: mongodb://talentos:talentos@mongodb:27017/talentos?authSource=admin
      API_URL: http://api:3001
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongodb_data:
